; Full-spectrum GPx search for the PNT2 in-situ dataset from MSV000087442.
; Invoke with --glycans msv000087442-sianaz. That library contains the nine
; glycoforms reported in the study, producing 27 jobs including loss variants.

[xquest]
xquest_bin = bin/xquest.pl

[tolerances]
diagnostic_tolerance_ppm = 20
neutral_loss_tolerance_da = 0.05
ms1_tolerance_ppm = 20
ms2_tolerance_da = 0.1
isotope_pair_ms1_tolerance_ppm = 20
isotope_pair_rt_tolerance_min = 2.0

[crosslinker]
; X is xQuest's first variable-modification pseudo-residue: the glycan-bearing
; Asn is therefore also the NHS-cyclooctyne crosslink site.
; The dataset-specific glycan library uses ordinary NeuAc masses, so this
; preset includes the SiaNAz-for-NeuAc mass difference and is required.
name = nhs-cyclooctyne
label = none
shift_da = 0
xlinkermw = 205.085126607
xlink_sites = X:K
nterm_xlinkable = false

[modifications]
fixed_carbamidomethyl_cys = true
variable_oxidation = true

[glycan]
targets = N
max_glycans_per_peptide = 1

[limits]
max_jobs = 0
max_pruned_spectra = 0
max_total_job_spectrum_comparisons = 0
min_score = 0
max_precursor_error_ppm = 20

[execution]
job_parallelism = 0
