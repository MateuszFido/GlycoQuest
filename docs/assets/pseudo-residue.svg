<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" font-family="system-ui, sans-serif" font-size="12">
  <defs>
    <style>
      .title { font-size: 14px; font-weight: 600; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #cbd5e1; rx: 6; }
      .pseudo { fill: #fef3c7; stroke: #d97706; font-weight: 700; }
      .arrow { stroke: #64748b; stroke-width: 1.5; }
    </style>
  </defs>
  <text x="20" y="24" class="title">xQuest pseudo-residue decoding</text>
