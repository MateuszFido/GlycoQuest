; GlycoQuest settings
;
; Copy this file to your working directory (or pass --config /path/to/settings.ini).
; Lines starting with ; or # are comments. Boolean values: true/false, yes/no, 1/0.

; Execution mode is controlled on the command line: run by default, or pass
; --dry-run to validate configuration without calling xQuest.

; -----------------------------------------------------------------------------
; xQuest installation
; -----------------------------------------------------------------------------
[xquest]
; Path to the xquest executable (relative paths resolve against --xquest-root).
; Default install in this repository: xQuest/V2.1.7/xquest/bin/xquest.pl
xquest_bin = bin/xquest.pl

; -----------------------------------------------------------------------------
; MS/MS and precursor tolerances (CLI --ppm-tolerance overrides this).
; -----------------------------------------------------------------------------
[tolerances]
; Diagnostic oxonium-ion matching tolerance (ppm).
diagnostic_tolerance_ppm = 10

; MS1 precursor tolerance for isotope-pair filtering (ppm).
ms1_tolerance_ppm = 10

; MS2 fragment tolerance passed to xQuest (Da).
ms2_tolerance_da = 0.2

; MS1 tolerance when matching light/heavy DSS isotope pairs (ppm).
isotope_pair_ms1_tolerance_ppm = 10

; Retention-time window for isotope-pair matching (minutes).
isotope_pair_rt_tolerance_min = 2.0

; -----------------------------------------------------------------------------
; Crosslinker (CLI --crosslinker overrides crosslinker name when provided)
; -----------------------------------------------------------------------------
[crosslinker]
; Bundled preset name: dss, dmtmm, nhs-cyclooctyne, ssbxl, or pcbxl.
; Other names use the explicit values below.
name = dss

; Labeling mode for the crosslinker isotope code.
;   light-heavy — require DSS light/heavy MS1 pairs before xQuest (default for DSS)
;   light-only  — skip isotope prefilter; xQuest light-only defs
;   none        — skip isotope prefilter; unlabeled crosslinkers (DMTMM, GPx, EDC)
label = light-heavy

; Heavy-label mass shift for isotope-coded DSS (Da). Ignored for isotope prefilter when label=none.
shift_da = 12.075321

; Crosslinker monoisotopic mass written to xQuest (Da). Preset values override it.
; DSS: 138.0680796; DMTMM: -18.0109; NHS-cyclooctyne: 205.085126607;
; SSBXL after TCEP/IAA: 573.179438173; PCBXL after photorelease: 456.190988659.
xlinkermw = 138.0680796

; Allowed crosslink site pairs, comma-separated (xQuest AArequired syntax).
; Examples: K:K  |  K:K,K:Z,Z:Z  (Z = N-terminal xlink pseudo-site when enabled)
xlink_sites = K:K

; Allow N-terminal crosslinking (maps to xQuest ntermxlinkable 1 and Z sites).
nterm_xlinkable = false

; -----------------------------------------------------------------------------
; Peptide modifications (xQuest fixed/variable mods)
; -----------------------------------------------------------------------------
[modifications]
; Fixed carbamidomethylation on cysteine (standard xQuest fixed mod).
fixed_carbamidomethyl_cys = true

; Variable oxidation on methionine. Defaults to true.
variable_oxidation = true

; -----------------------------------------------------------------------------
; Glycan filtering and libraries
; -----------------------------------------------------------------------------
[glycan]
; Residues considered for glycan attachment in the glycan library (comma-separated).
targets = N,S,T

; Maximum occurrences of the searched glycan composition on either peptide (1-3).
; Three glycans plus optional methionine oxidation reach xQuest's four-variable-modification limit.
max_glycans_per_peptide = 3

; -----------------------------------------------------------------------------
; Job limits and result post-filters
; -----------------------------------------------------------------------------
[limits]
; Maximum concurrent xQuest jobs (0 = no limit).
max_jobs = 0

; Stop after this many spectra survive glycan pruning (0 = no limit).
max_pruned_spectra = 0

; Cap total spectrum comparisons across all jobs (0 = no limit).
max_total_job_spectrum_comparisons = 0

; Minimum xQuest score to keep in consolidated results.
min_score = 0

; Maximum precursor mass error (ppm) for post-filtering hits.
max_precursor_error_ppm = 20

; -----------------------------------------------------------------------------
; Job execution
; -----------------------------------------------------------------------------
[execution]
; Number of xQuest jobs to run concurrently (0 = one per available CPU core).
; The CLI flag --jobs/-j overrides this value.
job_parallelism = 0
